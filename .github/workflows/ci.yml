name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f index.html
          test -f .env.example

      - name: Basic HTML sanity check
        run: grep -Eiq '<html|<!doctype html' index.html
